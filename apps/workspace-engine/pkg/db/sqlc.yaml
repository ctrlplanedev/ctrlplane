version: "2"
servers:
  - engine: postgresql
    uri: "postgresql://ctrlplane:ctrlplane@127.0.0.1:5432/ctrlplane?sslmode=disable"
sql:
  - engine: postgresql
    schema:
      - queries/schema.sql
    queries:
      - queries/workspaces.sql
      - queries/deployment_versions.sql
      - queries/deployments.sql
      - queries/environments.sql
      - queries/systems.sql
      - queries/job_agents.sql
      - queries/resources.sql
      - queries/resources_batch.sql
      - queries/resource_providers.sql
      - queries/releases.sql
      - queries/changelog.sql
      - queries/policies.sql
      - queries/user_approval_records.sql
      - queries/variables.sql
      - queries/workflows.sql
      - queries/policy_skips.sql
      - queries/computed_resources.sql
      - queries/job_verification_metric.sql
      - queries/jobs.sql
      - queries/computed_relationships.sql
      - queries/relationship_rules.sql
      - queries/policy_rule_evaluation.sql
      - queries/deployment_plan.sql
      - queries/release_targets.sql
      - queries/variable_sets.sql
    database:
      uri: "postgresql://ctrlplane:ctrlplane@127.0.0.1:5432/ctrlplane?sslmode=disable"
    gen:
      go:
        package: db
        out: .
        sql_package: pgx/v5
        overrides:
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: false
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"

          # DeploymentVersion
          - column: "deployment_version.config"
            go_type:
              type: "map[string]any"
          - column: "deployment_version.metadata"
            go_type:
              type: "map[string]string"
          - column: "deployment_version.job_agent_config"
            go_type:
              type: "map[string]any"

          # Deployment
          - column: "deployment.job_agent_config"
            go_type:
              type: "map[string]any"
          - column: "deployment.job_agents"
            go_type:
              type: "[]byte"
          - column: "deployment.metadata"
            go_type:
              type: "map[string]string"

          # Environment
          - column: "environment.metadata"
            go_type:
              type: "map[string]string"

          # ResourceProvider
          - column: "resource_provider.metadata"
            go_type:
              type: "map[string]string"

          # Resource
          - column: "resource.config"
            go_type:
              type: "map[string]any"
          - column: "resource.metadata"
            go_type:
              type: "map[string]string"

          # Job
          - column: "job.job_agent_id"
            go_type:
              type: "pgtype.UUID"
          - column: "job.job_agent_config"
            go_type:
              type: "[]byte"
          - column: "job.dispatch_context"
            go_type:
              type: "[]byte"

          # JobAgent
          - column: "job_agent.config"
            go_type:
              type: "map[string]any"

          # ReleaseVariable
          - column: "release_variable.value"
            go_type:
              type: "[]byte"

          # Policy
          - column: "policy.metadata"
            go_type:
              type: "map[string]string"

          # PolicyRuleVerification
          - column: "policy_rule_verification.metrics"
            go_type:
              type: "[]byte"

          # RelationshipRule
          - column: "relationship_rule.metadata"
            go_type:
              type: "map[string]string"

          # PolicyRuleSummary
          - column: "policy_rule_summary.details"
            go_type:
              type: "map[string]any"

          # PolicyRuleEvaluation
          - column: "policy_rule_evaluation.details"
            go_type:
              type: "map[string]any"

          # VariableValue
          - column: "variable_value.literal_value"
            go_type:
              type: "[]byte"
          - column: "variable_value.ref_path"
            go_type:
              type: "[]string"
          - column: "variable_value.secret_path"
            go_type:
              type: "[]string"

          # VariableSet
          - column: "variable_set.metadata"
            go_type:
              type: "map[string]string"

          # VariableSetVariable
          - column: "variable_set_variable.value"
            go_type:
              type: "[]byte"

          # Workflow
          - column: "workflow.inputs"
            go_type:
              type: "[]byte"
          - column: "workflow.jobs"
            go_type:
              type: "[]byte"

          # WorkflowJobTemplate
          - column: "workflow_job_template.config"
            go_type:
              type: "map[string]any"
          - column: "workflow_job_template.matrix"
            go_type:
              type: "[]byte"

          # WorkflowRun
          - column: "workflow_run.inputs"
            go_type:
              type: "map[string]any"

          # WorkflowJob
          - column: "workflow_job.config"
            go_type:
              type: "map[string]any"

          # DeploymentPlan
          - column: "deployment_plan.version_config"
            go_type:
              type: "map[string]any"
          - column: "deployment_plan.version_job_agent_config"
            go_type:
              type: "map[string]any"
          - column: "deployment_plan.version_metadata"
            go_type:
              type: "map[string]string"
          - column: "deployment_plan.metadata"
            go_type:
              type: "map[string]string"

          # DeploymentPlanTargetResult
          - column: "deployment_plan_target_result.dispatch_context"
            go_type:
              type: "[]byte"
          - column: "deployment_plan_target_result.agent_state"
            go_type:
              type: "[]byte"
